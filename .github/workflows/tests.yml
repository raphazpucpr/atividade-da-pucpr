name: Tests

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compile all
        run: javac src/Calculadora.java src/Main.java src/test/CalculadoraTest.java

      - name: Run tests
        run: java -ea -cp src:. src.test.CalculadoraTest
